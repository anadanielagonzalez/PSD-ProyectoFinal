<!DOCTYPE html>
<head>
    <title>PSD-ProyectoFinal</title>
    <link rel="stylesheet" href="../css/checkout.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>
    <header class="site-header">
        <a class="logo-link" href="index.html" aria-label="Inicio de Blue Fiesta">
            <img src="../Assets/logo.png" alt="Blue Fiesta logo" class="logo">
        </a>

        <div class="header-center">
            <form class="search-form" action="#" role="search">
                <label class="sr-only" for="site-search">Buscar</label>
                <input id="site-search" type="search" name="buscar" placeholder="Buscar">
            </form>

            <nav class="main-nav" aria-label="Navegación principal">
                <a href="index.html">Inicio</a>
                <a href="aboutus.html">Sobre Nosotros</a>
                <a href="products.html" >Productos</a>
                <a href="cart.html" class="active">Carrito</a>
            </nav>
        </div>

        <div class="profile-circle" aria-hidden="true"></div>
    </header>
    <main>
    <section id="checkout">
    <div class="S1">
        <h1>Selecciona un método de pago</h1>
        <h2>Selecciona el método de pago que deseas<br>
            usar para pagar tu pedido.</h2>
        <div class="metodos">
            <button class="metodo">Paypal
                <span>></span>
            </button>
            <button class="metodo">Tarjeta de débito / crédito
                <span>></span>
            </button>
            <button class="metodo">Apple Pay
                <span>></span>
            </button>
        </div>
        <p class="ayuda">¿Necesitas ayuda?</p>
        <div class="logos">
            <div class="visa"><img class="apps" src="../assets/Visa_Inc.-Logo.wine.png" alt="Logo de Visa"></div>
            <div class="ae"><img class="apps" src="../assets/American-Express-Logo.png" alt="Logo de American Express"></div>
            <div class="mc"><img class="apps" src="../assets/logo-Mastercard.png" alt="Logo de Mastercard"></div>
            <div class="ap"><img class="apple" src="../assets/Apple_Pay_logo.png" alt="Logo de Apple Pay"></div>
        </div>
    </div>
    <div>
        <form class="form-checkout" action="../html/orderconfirmation.html">
            <label>Nombre en la tarjeta</label>
            <input class="checkout-input" type="text" placeholder="Nombre del titular">
            <label>Número de tarjeta</label>
            <input class="checkout-input" type="text" placeholder="xxxx - xxxx - xxxx - xxxx">
            <div class="ct">
                <label>CVV</label>
                <label>Fecha de vencimiento</label>
            </div>
            <div class="cd">
                <input class="cv" type="text" placeholder="xxx">
                <input class="date" type="text" placeholder="MM - AAAA">
            </div>
            <input class="submit-btn" type="submit" value="Proceder al pago">
        </form>
    </div>
    </section>
    </main>

    <script defer src="../js/product.js"></script>
    <script defer src="../js/main.js"></script>

    <footer>
        <button class="pie">
            © 2026 Blue Fiesta. Hecho en México.
        </button>
    </footer>

</body>

</html>
