<!DOCTYPE html>
<head>
    <title>PSD-ProyectoFinal</title>
    <link rel="stylesheet" href="../css/product.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>
    <header>

    </header>
    <main>
    <section id="producto-individual">
    
        <button id="btn-prev"></button>

        <img id="product-image" class="producto" src="../assets/pinata-dolphin.png" alt="Piñata de delfín">
      
    <div class="info"> 
        <div class="rectangulo"></div>
        <h1 id="product-name" class="nombre">Dulce Delfín</h1>
        <h2 id="product-price">$25.00</h2>
        
        <h3 class="seleccion">Selecciona el tamaño</h3>
        <button class="select">S</button>
        <button class="select">M</button>
        <button class="select">L</button>

        <h3 class="seleccion">Selecciona el material</h3>
        <button class="select">Reciclable</button>
        <button class="select">Estándar</button>
        <button class="select">Importado</button>

        <p class="causa">Una parte de esta compra apoya donaciones para ayudar a proteger a la vaquita marina.<br>
            Entre mayor sea el precio, mayor será la contribución a esta causa.</p>

        <a href="../html/cart.html">
            <button class="carrito">Añadir al carrito</button>
        </a> 
        
        <div class="cards-row">
            <div>
                <button class="more-desc">
                <h3>Descripción</h3>
                <p id="product-desc">Una piñata vibrante hecha a mano, diseñada para llenar de color, 
                    emoción y alegría cualquier celebración, para 
                    crear momentos inolvidables en la fiesta.</p>
                </button>
                <button class="puntaje">
                    <div class="rate">
                        <h3>Calificación</h3>
                        <div class="estrella"></div>
                        <div class="estrella"></div>
                        <div class="estrella"></div>
                        <div class="estrella"></div>
                        <div class="estrella"></div>  
                    </div>  
                </button>
            </div>
            
            <button class="more-ship">
                <h3>Envío</h3>

                <div class="shipping-item">
                    <div class="circulo"><img id="product-imgdata1" class="imgdatos" src="../assets/caa.png" alt="Icono de calendario"></div>
                    <div class="shipping-text">
                        <h4>Tiempo de entrega</h4>
                        <p class="datos">3-5 Días hábiles</p>
                    </div>
                </div>
                <div class="shipping-item">
                    <div class="circulo"><img id="product-imgdata2" class="imgdatos" src="../assets/dee.png" alt="Icono de camión de envío"></div>
                    <div class="shipping-text">
                        <h4>Tiempo estimado</h4>
                        <p class="datos">11–13 de abril de 2026</p>
                    </div>
                </div>

                <p class="careful">*Elaborado cuidadosamente y <br>
                    enviado con atención al detalle.</p>
                
            </button>
        </div>
    </div>

    <button id="btn-next"></button>

    </section>
    </main>

    <script defer src="../js/product.js"></script>
    <script defer src="../js/main.js"></script>

    <footer>
        <button class="pie">
            © 2026 Blue Fiesta. Hecho en México.
        </button>
    </footer>

</body>

</html>
