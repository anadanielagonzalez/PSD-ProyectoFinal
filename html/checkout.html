<!DOCTYPE html>
<head>
    <title>PSD-ProyectoFinal</title>
    <link rel="stylesheet" href="../css/checkout.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>
    <header>

    </header>
    <main>
    <section id="checkout">
    <div class="S1">
        <h1>Select a payment<br>
            method</h1>
        <h2>Select a payment method you want<br>
            to use to pay for your order.</h2>
        <div class="metodos">
            <button class="metodo">Paypal
                <span>></span>
            </button>
            <button class="metodo">Debit / Credit card
                <span>></span>
            </button>
            <button class="metodo">Apple Pay
                <span>></span>
            </button>
        </div>
        <p class="ayuda">Need Support ?</p>
        <div class="logos">
            <div class="visa"><img class="apps" src="../assets/Visa_Inc.-Logo.wine.png" alt="Logo de Visa"></div>
            <div class="ae"><img class="apps" src="../assets/American-Express-Logo.png" alt="Logo de American Express"></div>
            <div class="mc"><img class="apps" src="../assets/logo-Mastercard.png" alt="Logo de Mastercard"></div>
            <div class="ap"><img class="apple" src="../assets/Apple_Pay_logo.png" alt="Logo de Apple Pay"></div>
        </div>
    </div>
    <div>
        <form action="../html/orderconfirmation.html">
            <label>Name on card</label>
            <input type="text" placeholder="Enter card holder´s name">
            <label>Card number</label>
            <input type="text" placeholder="xxxx - xxxx - xxxx - xxxx">
            <div class="ct">
                <label>CVV</label>
                <label>Card Expiration Date</label>
            </div>
            <div class="cd">
                <input class="cv" type="text" placeholder="xxx">
                <input class="date" type="text" placeholder="MM - YYYY">
            </div>
            <input type="submit" value="Proceed payment">
        </form>
    </div>
    </section>
    </main>

    <script defer src="../js/product.js"></script>
    <script defer src="../js/main.js"></script>

    <footer>
        <button class="pie">
            © 2026 Blue Fiesta. Made in Mexico.
        </button>
    </footer>

</body>

</html>
