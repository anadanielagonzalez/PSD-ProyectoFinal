<!DOCTYPE html>
<head>
    <title>PSD-ProyectoFinal</title>
    <link rel="stylesheet" href="../css/cart.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>
    <header class="site-header">
        <a class="logo-link" href="index.html" aria-label="Inicio de Blue Fiesta">
            <img src="../Assets/logo.png" alt="Blue Fiesta logo" class="logo">
        </a>

        <div class="header-center">
            <form class="search-form" action="#" role="search">
                <label class="sr-only" for="site-search">Buscar</label>
                <input id="site-search" type="search" name="buscar" placeholder="Buscar">
            </form>

            <nav class="main-nav" aria-label="Navegación principal">
                <a href="index.html">Inicio</a>
                <a href="aboutus.html">Sobre Nosotros</a>
                <a href="products.html" >Productos</a>
                <a href="cart.html" class="active">Carrito</a>
            </nav>
        </div>

        <div class="profile-circle" aria-hidden="true"></div>
    </header>
    <main>
    <section id="carrito-de-compras">
        <h1>Carrito de compras</h1>

        <div class="tablas">
            <div>
            <table>
                <tr>
                    <th class="title">Productos</th>
                    <th class="title">Cantidad</th>
                    <th class="title">Total</th>
                    <th class="title">Acción</th>
                </tr>
                <tr>
                    <td colspan="4" >
                        <div class="linea"></div>
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <div class="cantidad">
                            <button class="mas">+</button>
                            <span>1</span>
                            <button class="menos">−</button>
                        </div>
                    </td>
                    <td></td>
                    <td><button class="delete"><img class="basura" src="../assets/trash.png" alt="Icono de basura"></button></td>
                </tr>
            </table>

            <button class="actualizar">Actualizar el carrito</button>
            </div>
        <table>
            <tr>
                <th class="title-resumen">Resumen del pedido</th>
                <th></th>
            </tr>
            <tr>
                <td>Subtotal</td>
                <td></td>
            </tr>
            <tr>
                <td>Costo de envío</td>
                <td></td>
            </tr>
            <tr>
                <td colspan="2" >
                    <div class="linea-espacio"></div>
                </td>
            </tr>
            <tr>
                <td class="total">Total</td>
                <td></td>
            </tr>
            <tr>
                <td colspan="2" >
                    <a href="../html/checkout.html">
                        <button class="comprar">Finalizar compra ahora</button>
                    </a>
                    
                </td>
            </tr>
        </table>
        </div>
        
    </section>
    </main>

    <script defer src="../js/product.js"></script>
    <script defer src="../js/main.js"></script>

    <footer>
        <button class="pie">
            © 2026 Blue Fiesta. Hecho en México.
        </button>
    </footer>

</body>

</html>
