<!DOCTYPE html>
<head>
    <title>PSD-ProyectoFinal</title>
    <link rel="stylesheet" href="../css/product.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>
    <header>

    </header>
    <main>
    <section id="producto-individual">
    
        <button id="btn-prev"></button>

        <img id="product-image" class="producto" src="../assets/pinata-dolphin.png" alt="Piñata de delfín">
      
    <div class="info"> 
        <div class="rectangulo"></div>
        <h1 id="product-name" class="nombre">Sweet Dolphin</h1>
        <h2 id="product-price">$25.00</h2>
        
        <h3 class="seleccion">Select Size</h3>
        <button class="select">S</button>
        <button class="select">M</button>
        <button class="select">L</button>

        <h3 class="seleccion">Select Material</h3>
        <button class="select">Recycable</button>
        <button class="select">Standard</button>
        <button class="select">Imported</button>

        <p class="causa">A portion of this purchase supports donations to help protect the vaquita marina. The higher<br> 
            the price, the greater the contribution to this cause.</p>

        <a href="../html/cart.html">
            <button class="carrito">Add to Cart</button>
        </a> 
        
        <div class="cards-row">
            <div>
                <button class="more-desc">
                <h3>Description</h3>
                <p id="product-desc">A vibrant handmade piñata designed to bring color, 
                excitement, and joy to any celebration, making it the 
                perfect centerpiece for unforgettable party moments.</p>
                </button>
                <button class="puntaje">
                    <div class="rate">
                        <h3>Rating</h3>
                        <div class="estrella"></div>
                        <div class="estrella"></div>
                        <div class="estrella"></div>
                        <div class="estrella"></div>
                        <div class="estrella"></div>  
                    </div>  
                </button>
            </div>
            
            <button class="more-ship">
                <h3>Shipping</h3>

                <div class="shipping-item">
                    <div class="circulo"><img id="product-imgdata1" class="imgdatos" src="../assets/caa.png" alt="Icono de calendario"></div>
                    <div class="shipping-text">
                        <h4>Delivery Time</h4>
                        <p class="datos">3-5 Working Days</p>
                    </div>
                </div>
                <div class="shipping-item">
                    <div class="circulo"><img id="product-imgdata2" class="imgdatos" src="../assets/dee.png" alt="Icono de camión de envío"></div>
                    <div class="shipping-text">
                        <h4>Etimation Arrive</h4>
                        <p class="datos">11-13 April 2026</p>
                    </div>
                </div>

                <p class="careful">*Carefully crafted and shipped<br>
                    with attention to detail.</p>
                
            </button>
        </div>
    </div>

    <button id="btn-next"></button>

    </section>
    </main>

    <script defer src="../js/product.js"></script>
    <script defer src="../js/main.js"></script>

    <footer>
        <button class="pie">
            © 2026 Blue Fiesta. Made in Mexico.
        </button>
    </footer>

</body>

</html>
